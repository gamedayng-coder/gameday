name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run nightly E2E tests against live environment
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          # Dummy values so Next.js build completes without real DB/auth creds
          AUTH_SECRET: ci-placeholder
          DATABASE_URL: file:./dev.db

  test-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    needs: build
    # Only run E2E tests on main branch and scheduled runs (not on PRs)
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          BASE_URL: https://gameday-wheat.vercel.app
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY || 'test-bearer-token' }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/test-results/
          retention-days: 30

      - name: Publish Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: web/playwright-report/
          retention-days: 7
