name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers and System Dependencies
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npm run test:e2e
        env:
          BASE_URL: https://gameday-wheat.vercel.app
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY || 'test-bearer-token' }}

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: web/test-results/
          retention-days: 30

      - name: Comment PR with Test Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'web/test-results/results.json';

            if (!fs.existsSync(resultsPath)) {
              console.log('No test results found');
              return;
            }

            const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
            const totalTests = results.stats.expected;
            const failedTests = results.stats.unexpected;
            const skipped = results.stats.skipped;
            const passed = totalTests - failedTests - skipped;

            const testStatus = failedTests > 0 ? '❌ FAILED' : '✅ PASSED';
            const comment = `## E2E Test Results ${testStatus}

            - **Total:** ${totalTests}
            - **Passed:** ${passed}
            - **Failed:** ${failedTests}
            - **Skipped:** ${skipped}

            [View full report](artifacts)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
