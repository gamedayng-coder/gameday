name: Deploy to Vercel (staging)

# Vercel deploys automatically via its GitHub App — no secrets or CLI needed here.
#
# One-time setup:
#   1. Go to vercel.com → "Add New Project"
#   2. Import gamedayng-coder/gameday from GitHub
#   3. Set Root Directory to: web
#   4. Vercel auto-detects Next.js — click Deploy
#
# After that, Vercel handles everything:
#   - Production deploy on every push to main → gameday.vercel.app (or custom domain)
#   - Preview deploy on every pull request → unique preview URL per PR
#
# This workflow is a no-op placeholder. It exists so the deploy step is
# visible in the GitHub Actions tab alongside CI, making the pipeline
# easy to reason about.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-info:
    runs-on: ubuntu-latest
    steps:
      - name: Deployment handled by Vercel GitHub App
        run: |
          echo "Vercel is connected to this repo and deploys automatically."
          echo "Check https://vercel.com/dashboard for deploy status and preview URLs."
